<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Spice Haven</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-login">

        <div class="login-card">

            <h1>🍽️ Spice Haven</h1>
            <h2>Admin Login</h2>

            <form id="adminLoginForm">

                <input
                    type="text"
                    id="adminUsername"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    id="adminPassword"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

                <p id="loginMessage"></p>

            </form>

        </div>

    </div>

    <script src="admin.js"></script>

</body>
</html>

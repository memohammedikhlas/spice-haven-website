<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | Spice Haven</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <header class="dashboard-header">
        <div>
            <h1>🍽️ Spice Haven</h1>
            <p>Admin Dashboard</p>
        </div>

        <button id="logoutBtn">Logout</button>
    </header>

    <main class="dashboard-container">

        <div class="stats-container">

            <div class="stat-card">
                <h3>Total Reservations</h3>
                <span id="reservationCount">0</span>
            </div>

            <div class="stat-card">
                <h3>Contact Messages</h3>
                <span id="contactCount">0</span>
            </div>

        </div>


        <section class="dashboard-section">

            <div class="section-heading">
                <h2>Reservations</h2>
                <button id="refreshReservations">Refresh</button>
            </div>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Guests</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="reservationsTable">
                        <tr>
                            <td colspan="6">Loading reservations...</td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </section>


        <section class="dashboard-section">

            <div class="section-heading">
                <h2>Contact Messages</h2>
                <button id="refreshContacts">Refresh</button>
            </div>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Message</th>
                        </tr>
                    </thead>

                    <tbody id="contactsTable">
                        <tr>
                            <td colspan="4">Loading messages...</td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <script src="dashboard.js"></script>

</body>
</html>
